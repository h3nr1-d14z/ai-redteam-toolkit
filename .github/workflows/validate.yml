name: Validate Repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Shell syntax checks
        run: bash -n setup/*.sh

      - name: Consistency checks
        run: ./setup/check-consistency.sh
